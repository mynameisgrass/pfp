<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <!-- Sky gradient -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#E0F6F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#90EE90;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#skyGradient)" />

  <!-- Clouds -->
  <g opacity="0.8">
    <!-- Cloud 1 -->
    <ellipse cx="200" cy="150" rx="80" ry="40" fill="white" opacity="0.7"/>
    <ellipse cx="250" cy="140" rx="100" ry="50" fill="white" opacity="0.6"/>
    <ellipse cx="300" cy="150" rx="80" ry="40" fill="white" opacity="0.7"/>

    <!-- Cloud 2 -->
    <ellipse cx="900" cy="200" rx="90" ry="45" fill="white" opacity="0.7"/>
    <ellipse cx="960" cy="185" rx="110" ry="55" fill="white" opacity="0.6"/>
    <ellipse cx="1020" cy="200" rx="90" ry="45" fill="white" opacity="0.7"/>

    <!-- Cloud 3 -->
    <ellipse cx="1500" cy="120" rx="70" ry="35" fill="white" opacity="0.7"/>
    <ellipse cx="1540" cy="110" rx="85" ry="42" fill="white" opacity="0.6"/>
    <ellipse cx="1580" cy="120" rx="70" ry="35" fill="white" opacity="0.7"/>
  </g>

  <!-- Trees -->
  <g>
    <!-- Tree 1 (left) -->
    <rect x="150" y="650" width="25" height="100" fill="#8B6F47"/>
    <circle cx="162.5" cy="600" r="70" fill="#2D5016"/>
    <circle cx="162.5" cy="640" r="50" fill="#3D7C2F"/>

    <!-- Tree 2 -->
    <rect x="350" y="600" width="30" height="120" fill="#8B6F47"/>
    <circle cx="365" cy="540" r="80" fill="#4CAF50"/>
    <circle cx="365" cy="590" r="60" fill="#3D7C2F"/>

    <!-- Tree 3 (center) -->
    <rect x="600" y="630" width="20" height="90" fill="#8B6F47"/>
    <circle cx="610" cy="580" r="65" fill="#2D5016"/>
    <circle cx="610" cy="620" r="45" fill="#4CAF50"/>

    <!-- Tree 4 -->
    <rect x="850" y="610" width="28" height="110" fill="#8B6F47"/>
    <circle cx="864" cy="550" r="75" fill="#3D7C2F"/>
    <circle cx="864" cy="600" r="55" fill="#4CAF50"/>

    <!-- Tree 5 (right) -->
